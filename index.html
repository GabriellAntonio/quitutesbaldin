<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quitutes Baldin - Gestão Profissional</title>

        <link rel="icon" type="image/png" href="appicon.png">
        <link rel="apple-touch-icon" href="appicon.png">
    <!-- Bibliotecas de Renderização -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (Versão Compat - Estabilidade para GitHub Pages) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FCF8F3; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        @keyframes swing { 0% { transform: rotate(0); } 10% { transform: rotate(10deg); } 30% { transform: rotate(-10deg); } 50% { transform: rotate(5deg); } 70% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }
        .animate-swing { animation: swing 2s infinite; }
        
        @media print {
            body { background: white !important; }
            .print-hidden, header, nav, button, .no-print { display: none !important; }
            .print-area { 
                display: block !important; 
                position: absolute; 
                top: 0; 
                left: 0; 
                width: 100%; 
                padding: 20px;
                background: white !important;
            }
            .modal-content { box-shadow: none !important; border: none !important; width: 100% !important; padding: 0 !important; background: white !important; }
            * { color: black !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // =========================================================
        // 1. CONFIGURAÇÃO DO FIREBASE (ATUALIZADO)
        // =========================================================
        let firebaseConfig = {
            apiKey: "AIzaSyADAJsA21bsGbgEYU4moNgPelc0oJzkduU",
            authDomain: "quitutes-1dce1.firebaseapp.com",
            projectId: "quitutes-1dce1",
            storageBucket: "quitutes-1dce1.firebasestorage.app",
            messagingSenderId: "961436368708",
            appId: "1:961436368708:web:59d5ae260b1dbcc5d2e111"
        };
        // =========================================================

        const isInternalEnv = typeof __firebase_config !== 'undefined';
        if (isInternalEnv) { firebaseConfig = JSON.parse(__firebase_config); }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quitutes-baldin-web';
        const NOTIFICATION_SOUND_URL = "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3";

        // Inicialização do Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- COMPONENTES AUXILIARES ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = () => (
            <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-white rounded-full overflow-hidden border-2 border-white/20 shadow-sm flex items-center justify-center">
                    <img src="appicon.png" alt="Logo" className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; e.target.parentNode.innerHTML = '<span class="text-2xl">🧺</span>'; }} />
                </div>
                <div>
                    <h1 className="text-lg font-black text-white uppercase leading-none">Quitutes Baldin</h1>
                    <div className="flex items-center gap-1.5 mt-0.5">
                        <div className="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></div>
                        <span className="text-[8px] font-bold opacity-60 uppercase text-[#F5E6D3]">Nuvem Ativa</span>
                    </div>
                </div>
            </div>
        );

        const CATEGORIAS = ["Salgados", "Pães", "Sucos", "Outros"];

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('mesas');
            const [isAudioEnabled, setIsAudioEnabled] = useState(false);
            const [authError, setAuthError] = useState(null);
            const [permissionError, setPermissionError] = useState(false);
            const prevReadyCountRef = useRef(0);

            const [mesas, setMesas] = useState([]);
            const [cardapio, setCardapio] = useState([]);
            const [comandas, setComandas] = useState([]);
            const [historico, setHistorico] = useState([]);
            const [caixaStatus, setCaixaStatus] = useState({ status: 'Fechado' });

            const [selectedMesa, setSelectedMesa] = useState(null);
            const [showProductModal, setShowProductModal] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [productForm, setProductForm] = useState({ nome: '', preco: '', categoria: 'Salgados' });
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [receiptData, setReceiptData] = useState(null);
            const [showNameModal, setShowNameModal] = useState(false);
            const [showClosureModal, setShowClosureModal] = useState(false);
            const [showConfirmClose, setShowConfirmClose] = useState(false);
            const [tempClientName, setTempClientName] = useState("");
            const [pendingProduct, setPendingProduct] = useState(null);

            // 1. Efeito de Autenticação
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        setAuthError(err.code);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // 2. Efeito de Sincronização (Guardado por User)
            useEffect(() => {
                if (!user) return;

                const handleError = (err) => {
                    console.error("Firestore Error:", err);
                    if (err.code === 'permission-denied') {
                        setPermissionError(true);
                    }
                };

                const unsubCaixa = db.doc(`artifacts/${appId}/public/data/settings/caixa`).onSnapshot(snap => {
                    if (snap.exists) setCaixaStatus(snap.data());
                }, handleError);

                const unsubMesas = db.collection(`artifacts/${appId}/public/data/tables`).onSnapshot(snap => {
                    setMesas(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => String(a.numero).localeCompare(String(b.numero))));
                }, handleError);

                const unsubMenu = db.collection(`artifacts/${appId}/public/data/menu`).onSnapshot(snap => {
                    setCardapio(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, handleError);

                const unsubOrders = db.collection(`artifacts/${appId}/public/data/orders`).onSnapshot(snap => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const count = docs.reduce((acc, c) => acc + (c.itens?.filter(i => i.pronto).length || 0), 0);
                    if (count > prevReadyCountRef.current && isAudioEnabled) {
                        new Audio(NOTIFICATION_SOUND_URL).play().catch(()=>{});
                    }
                    prevReadyCountRef.current = count;
                    setComandas(docs);
                }, handleError);

                const unsubHistory = db.collection(`artifacts/${appId}/public/data/history`).onSnapshot(snap => {
                    setHistorico(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)));
                }, handleError);

                return () => {
                    unsubCaixa(); unsubMesas(); unsubMenu(); unsubOrders(); unsubHistory();
                };
            }, [user, isAudioEnabled]);

            // Funções de UI
            const isCaixaAberto = caixaStatus.status === 'Aberto';
            const totalDia = useMemo(() => historico.reduce((acc, curr) => acc + (Number(curr.total) || 0), 0), [historico]);
            const comandaAtual = useMemo(() => selectedMesa ? comandas.find(c => c.mesaId === selectedMesa.id) : null, [selectedMesa, comandas]);
            const totalComandaAtual = useMemo(() => comandaAtual?.itens?.reduce((acc, curr) => acc + (Number(curr.preco) * Number(curr.quantidade)), 0) || 0, [comandaAtual]);
            const hasReadyItems = useMemo(() => comandas.some(c => c.itens?.some(i => i.pronto)), [comandas]);

            const closureSummary = useMemo(() => {
                const s = { total: 0, PIX: 0, Cartão: 0, Dinheiro: 0, count: historico.length, items: {} };
                historico.forEach(v => {
                    const val = Number(v.total) || 0; s.total += val;
                    const m = v.metodo || 'Dinheiro'; if (s.hasOwnProperty(m)) s[m] += val;
                    v.itens?.forEach(i => { const n = i.nome || i.name || "Item"; s.items[n] = (s.items[n] || 0) + (Number(i.quantidade || i.qty) || 0); });
                });
                return s;
            }, [historico]);

            // Lógica de Venda e Caixa
            const handleAbrirCaixa = () => db.doc(`artifacts/${appId}/public/data/settings/caixa`).set({ status: 'Aberto', timestamp: Date.now() });

            const handleFecharCaixaFinal = async () => {
                const batch = db.batch();
                const histSnap = await db.collection(`artifacts/${appId}/public/data/history`).get();
                histSnap.forEach(d => batch.delete(d.ref));
                batch.set(db.doc(`artifacts/${appId}/public/data/settings/caixa`), { status: 'Fechado', timestamp: Date.now() });
                await batch.commit();
                setShowConfirmClose(false); setShowClosureModal(false);
            };

            const handleItemAction = (p, dlt) => {
                if (!isCaixaAberto) return;
                const existing = comandas.find(c => c.mesaId === selectedMesa.id);
                if (!existing) {
                    if (dlt <= 0) return;
                    setPendingProduct(p); setTempClientName(""); setShowNameModal(true);
                } else {
                    const idx = existing.itens.findIndex(i => i.produtoId === p.id);
                    let newItens = [...existing.itens];
                    if (idx > -1) {
                        newItens[idx].quantidade += dlt;
                        if (newItens[idx].quantidade <= 0) newItens.splice(idx, 1);
                    } else if (dlt > 0) {
                        newItens.push({ produtoId: p.id, nome: p.nome, preco: p.preco, quantidade: 1, pronto: false });
                    }
                    if (newItens.length === 0) {
                        db.doc(`artifacts/${appId}/public/data/orders/${existing.id}`).delete();
                        db.doc(`artifacts/${appId}/public/data/tables/${selectedMesa.id}`).update({ status: 'Livre', cliente: "" });
                    } else {
                        db.doc(`artifacts/${appId}/public/data/orders/${existing.id}`).update({ itens: newItens });
                    }
                }
            };

            const confirmOpening = () => {
                const name = tempClientName.trim() || "Consumo";
                db.collection(`artifacts/${appId}/public/data/orders`).add({ mesaId: selectedMesa.id, mesaNumero: selectedMesa.numero, cliente: name, itens: [{ produtoId: pendingProduct.id, nome: pendingProduct.nome, preco: pendingProduct.preco, quantidade: 1, pronto: false }], timestamp: Date.now() });
                db.doc(`artifacts/${appId}/public/data/tables/${selectedMesa.id}`).update({ status: 'Ocupada', cliente: name });
                setShowNameModal(false); setPendingProduct(null);
            };

            const finalizeSale = (metodo) => {
                const data = { mesaNumero: String(comandaAtual.mesaNumero), cliente: String(comandaAtual.cliente || "Cliente"), total: totalComandaAtual, metodo, itens: comandaAtual.itens, timestamp: Date.now() };
                db.collection(`artifacts/${appId}/public/data/history`).add(data);
                db.doc(`artifacts/${appId}/public/data/orders/${comandaAtual.id}`).delete();
                db.doc(`artifacts/${appId}/public/data/tables/${selectedMesa.id}`).update({ status: 'Livre', cliente: "" });
                setReceiptData(data); setSelectedMesa(null); setShowPaymentModal(false);
            };

            const saveProduct = () => {
                const data = { nome: String(productForm.nome), preco: parseFloat(productForm.preco), categoria: String(productForm.categoria) };
                if (editingProduct) db.doc(`artifacts/${appId}/public/data/menu/${editingProduct.id}`).update(data);
                else db.collection(`artifacts/${appId}/public/data/menu`).add(data);
                setShowProductModal(false); setEditingProduct(null); setProductForm({ nome: '', preco: '', categoria: 'Salgados' });
            };

            const handlePrint = () => { window.focus(); setTimeout(() => { window.print(); }, 250); };

            const copyToClipboard = (type) => {
                let text = "";
                if (type === 'receipt' && receiptData) {
                    text = `🧺 QUITUTES BALDIN\nMESA: ${receiptData.mesaNumero}\nCLIENTE: ${receiptData.cliente}\n---\n`;
                    receiptData.itens.forEach(i => text += `${i.quantidade || i.qty}x ${i.nome || i.name} - R$ ${(i.preco * (i.quantidade || i.qty)).toFixed(2)}\n`);
                    text += `---\nTOTAL: R$ ${receiptData.total.toFixed(2)}\nPGTO: ${receiptData.metodo}\nOBRIGADO!`;
                } else if (type === 'closure') {
                    text = `*** QUITUTES BALDIN - FECHO ***\nDATA: ${new Date().toLocaleDateString()}\nTOTAL: R$ ${closureSummary.total.toFixed(2)}\nVENDAS: ${closureSummary.count}\n---\nPIX: R$ ${closureSummary.PIX.toFixed(2)}\nCARTÃO: R$ ${closureSummary.Cartão.toFixed(2)}\nDINHEIRO: R$ ${closureSummary.Dinheiro.toFixed(2)}`;
                }
                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                alert("Copiado!");
            };

            // --- TELAS DE ERRO ---
            if (authError === 'auth/configuration-not-found') {
                return (
                    <div className="h-screen flex items-center justify-center p-8 bg-red-800 text-white text-center">
                        <div>
                            <Icon name="alert-circle" size={60} className="mx-auto mb-6" />
                            <h2 className="text-2xl font-black mb-4 uppercase">Ativar Login Anônimo</h2>
                            <p className="text-sm opacity-90 leading-relaxed mb-8">O Firebase recusou a conexão. Precisas de ativar o <b>Login Anônimo</b> no menu Authentication do teu console do Firebase.</p>
                            <button onClick={() => window.location.reload()} className="bg-white text-red-800 px-8 py-4 rounded-2xl font-bold uppercase text-xs">Tentar Recarregar</button>
                        </div>
                    </div>
                );
            }

            if (permissionError) {
                return (
                    <div className="h-screen flex items-center justify-center p-8 bg-orange-700 text-white text-center font-sans">
                        <div className="max-w-md">
                            <Icon name="shield-alert" size={60} className="mx-auto mb-6" />
                            <h2 className="text-2xl font-black mb-4 uppercase">Erro de Permissão</h2>
                            <p className="text-sm opacity-90 leading-relaxed mb-8">
                                O sistema não consegue ler os dados. <br/><br/>
                                1. Vai ao console do Firebase.<br/>
                                2. Menu <b>Firestore Database</b>.<br/>
                                3. Aba <b>Rules (Regras)</b>.<br/>
                                4. Garanta que as regras permitem acesso (ex: Modo de Teste).
                            </p>
                            <button onClick={() => window.location.reload()} className="bg-white text-orange-700 px-8 py-4 rounded-2xl font-bold uppercase text-xs">Recarregar Sistema</button>
                        </div>
                    </div>
                );
            }

            if (!user) return (
                <div className="h-screen flex items-center justify-center">
                    <div className="text-center animate-pulse">
                        <div className="text-5xl mb-4">🧺</div>
                        <p className="font-bold text-[#8B5A2B] text-xs uppercase tracking-widest">Quitutes Baldin...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#FCF8F3] pb-24 text-[#4A3728]">
                    <header className="bg-[#8B5A2B] text-white p-6 shadow-xl sticky top-0 z-50 print-hidden">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <Logo />
                            <div className="flex items-center gap-4">
                                <button onClick={() => { setIsAudioEnabled(!isAudioEnabled); if(!isAudioEnabled) new Audio(NOTIFICATION_SOUND_URL).play().catch(()=>{}); }} className={`p-2 rounded-full transition-all ${isAudioEnabled ? 'bg-orange-500 shadow-inner' : 'bg-white/10'}`}>
                                    <Icon name={isAudioEnabled ? "volume-2" : "volume-x"} size={20} />
                                </button>
                                <Icon name="bell" size={20} className={hasReadyItems ? "text-orange-400 animate-swing" : "opacity-20"} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 animate-in fade-in duration-500">
                        {activeTab === 'mesas' && !selectedMesa && (
                            <div className="space-y-6 print-hidden">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-lg font-black text-[#8B5A2B] uppercase tracking-widest">Salão</h2>
                                    <button onClick={() => db.collection(`artifacts/${appId}/public/data/tables`).add({ numero: (mesas.length + 1).toString().padStart(2, '0'), status: 'Livre', cliente: '' })} className="bg-[#4A773C] text-white px-5 py-2 rounded-xl font-bold text-[10px] shadow-lg active:scale-95 transition-all">+ MESA</button>
                                </div>
                                {!isCaixaAberto && (
                                    <div className="bg-red-50 border-2 border-red-100 p-8 rounded-[40px] flex flex-col items-center text-center gap-3">
                                        <Icon name="lock" size={32} className="text-red-600" />
                                        <p className="text-sm font-black text-red-800 uppercase tracking-widest uppercase">Caixa Fechado</p>
                                    </div>
                                )}
                                <div className={`grid grid-cols-3 sm:grid-cols-4 gap-4 ${!isCaixaAberto ? 'opacity-40 pointer-events-none' : ''}`}>
                                    {mesas.map(m => (
                                        <div key={m.id} onClick={() => setSelectedMesa(m)} className={`relative aspect-square rounded-[32px] border-2 flex flex-col items-center justify-center transition-all cursor-pointer shadow-sm active:scale-90 px-2 text-center ${m.status === 'Ocupada' ? 'bg-[#FDF2E9] border-[#E67E22] text-[#E67E22]' : 'bg-white border-[#EADCCB] text-[#8B5A2B]'}`}>
                                            {comandas.find(c => c.mesaId === m.id)?.itens?.some(i => i.pronto) && <span className="absolute top-3 right-3 w-3 h-3 bg-red-500 rounded-full animate-pulse border-2 border-white"></span>}
                                            <span className="text-[8px] font-black opacity-30 uppercase mb-1">Mesa</span>
                                            <span className="text-3xl font-black">{String(m.numero)}</span>
                                            {m.status === 'Ocupada' && <span className="text-[9px] font-bold mt-1 uppercase truncate w-full">{String(m.cliente || "Consumo")}</span>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {selectedMesa && (
                            <div className="space-y-6 print-hidden">
                                <button onClick={() => setSelectedMesa(null)} className="flex items-center gap-2 text-[#8B5A2B] font-black text-xs uppercase"><Icon name="chevron-left" size={18} /> Voltar</button>
                                <div className="bg-white rounded-[40px] p-8 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-start mb-6">
                                        <h2 className="text-3xl font-black">Mesa {String(selectedMesa.numero)}</h2>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black text-gray-300 uppercase">Total</p>
                                            <p className="text-3xl font-black text-[#8B5A2B]">R$ {totalComandaAtual.toFixed(2)}</p>
                                        </div>
                                    </div>
                                    <div className="space-y-3 mb-8">
                                        {comandaAtual?.itens?.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-4 rounded-3xl bg-[#FCF8F3]">
                                                <div className="flex flex-col flex-1">
                                                    <p className="font-bold text-sm">{String(item.nome || item.name)}</p>
                                                    <p className="text-xs text-orange-600 font-bold">R$ {(item.preco * item.quantidade).toFixed(2)}</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <button onClick={() => handleItemAction({ id: item.produtoId }, -1)} className="bg-[#8B5A2B] text-white w-8 h-8 rounded-xl flex items-center justify-center font-bold shadow-md">-</button>
                                                    <span className="font-black text-sm w-4 text-center">{item.quantidade}</span>
                                                    <button onClick={() => handleItemAction({ id: item.produtoId }, 1)} className="bg-[#4A773C] text-white w-8 h-8 rounded-xl flex items-center justify-center font-bold shadow-md">+</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-6">
                                        {CATEGORIAS.map(cat => {
                                            const items = cardapio.filter(p => p.categoria === cat);
                                            if (items.length === 0) return null;
                                            return (
                                                <div key={cat} className="space-y-2">
                                                    <h3 className="text-[10px] font-black text-gray-400 uppercase px-2 tracking-widest">{cat}</h3>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {items.map(p => (
                                                            <button key={p.id} onClick={() => handleItemAction(p, 1)} className="bg-[#FCF8F3] p-4 rounded-3xl border border-transparent hover:border-[#8B5A2B] text-left active:scale-95 shadow-sm transition-all">
                                                                <p className="font-bold text-xs truncate">{String(p.nome)}</p>
                                                                <p className="text-[10px] text-orange-600 font-bold">R$ {Number(p.preco || 0).toFixed(2)}</p>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {comandaAtual && <button onClick={() => setShowPaymentModal(true)} className="w-full mt-8 bg-[#4A773C] text-white py-5 rounded-3xl font-black text-lg shadow-xl uppercase active:scale-95 transition-all">Fechar Conta</button>}
                                </div>
                            </div>
                        )}

                        {activeTab === 'cozinha' && (
                            <div className="space-y-6 print-hidden">
                                <h2 className="text-lg font-black text-[#8B5A2B] uppercase px-2 tracking-widest">Cozinha</h2>
                                {comandas.map(c => {
                                    const pending = c.itens?.filter(i => !i.pronto) || [];
                                    if (pending.length === 0) return null;
                                    return (
                                        <div key={c.id} className="bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100 mb-4 animate-in slide-in-from-top-4 duration-300">
                                            <div className="bg-[#8B5A2B] p-4 text-white font-black text-sm flex justify-between uppercase">
                                                <span>MESA {String(c.mesaNumero)} - {String(c.cliente || "S/ Nome")}</span>
                                                <Icon name="chef-hat" size={18} className="opacity-40" />
                                            </div>
                                            <div className="p-4 space-y-3">
                                                {pending.map((i, idx) => (
                                                    <div key={idx} className="flex justify-between items-center bg-[#FCF8F3] p-4 rounded-2xl border border-orange-50">
                                                        <span className="font-bold text-sm">{i.qty || i.quantidade}x {String(i.nome || i.name)}</span>
                                                        <button onClick={() => db.doc(`artifacts/${appId}/public/data/orders/${c.id}`).update({ itens: c.itens.map(item => (item.produtoId === i.produtoId) ? {...item, pronto: true} : item) })} className="bg-white text-[#4A773C] border-2 border-[#4A773C] px-5 py-2 rounded-full font-black text-[10px] uppercase active:bg-[#4A773C] active:text-white transition-all">Pronto</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'caixa' && (
                            <div className="space-y-6 print-hidden">
                                {isCaixaAberto ? (
                                    <>
                                        <div className="bg-[#4A773C] rounded-[40px] p-10 text-white shadow-2xl relative overflow-hidden">
                                            <p className="text-[10px] font-black opacity-60 uppercase mb-2 tracking-widest">Faturamento</p>
                                            <h2 className="text-5xl font-black tracking-tighter">R$ {totalDia.toFixed(2)}</h2>
                                            <Icon name="unlock" size={180} className="absolute right-[-20px] bottom-[-20px] opacity-10" />
                                        </div>
                                        <button onClick={() => setShowClosureModal(true)} className="bg-white w-full p-8 rounded-[40px] border-2 border-[#8B5A2B] flex flex-col items-center gap-3 shadow-sm active:scale-95 transition-all">
                                            <Icon name="file-text" size={32} className="text-[#8B5A2B]" />
                                            <span className="text-[12px] font-black text-[#8B5A2B] uppercase">Relatório e Fechar Dia</span>
                                        </button>
                                    </>
                                ) : (
                                    <div className="bg-[#8B5A2B] rounded-[40px] p-12 text-white shadow-2xl flex flex-col items-center text-center animate-in zoom-in duration-500">
                                        <Icon name="lock" size={60} className="mb-6 opacity-30" />
                                        <h2 className="text-2xl font-black mb-4 uppercase tracking-widest">Caixa Fechado</h2>
                                        <button onClick={handleAbrirCaixa} className="bg-white text-[#8B5A2B] px-12 py-5 rounded-3xl font-black uppercase shadow-xl hover:bg-[#F5E6D3] active:scale-95 transition-all">Abrir Caixa Agora</button>
                                    </div>
                                )}
                                <h3 className="font-black text-[#8B5A2B] uppercase px-2 tracking-widest">Vendas de Hoje</h3>
                                {historico.map(v => (
                                    <div key={v.id} className="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-gray-50 mb-2">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-green-50 p-3 rounded-2xl"><Icon name="check-circle-2" size={18} className="text-[#4A773C]"/></div>
                                            <div>
                                                <p className="font-black text-sm text-[#4A3728]">Mesa {String(v.mesaNumero || "-")} • {String(v.cliente || "Cliente")}</p>
                                                <p className="text-[9px] text-gray-400 font-bold uppercase">{v.metodo} • {v.timestamp ? new Date(v.timestamp).toLocaleTimeString() : ""}</p>
                                            </div>
                                        </div>
                                        <p className="font-black text-[#4A773C] text-lg">R$ {Number(v.total || 0).toFixed(2)}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'menu' && (
                            <div className="space-y-6 print-hidden">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-lg font-black text-[#8B5A2B] uppercase tracking-widest">Cardápio</h2>
                                    <button onClick={() => { setEditingProduct(null); setShowProductModal(true); }} className="bg-[#8B5A2B] text-white px-5 py-2 rounded-xl font-bold text-[10px] shadow-lg active:scale-95 transition-all">+ NOVO</button>
                                </div>
                                {CATEGORIAS.map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-gray-300 uppercase px-2">{cat}</h3>
                                        {cardapio.filter(p => p.categoria === cat).map(p => (
                                            <div key={p.id} className="bg-white p-5 rounded-[28px] flex justify-between items-center shadow-sm border border-gray-50">
                                                <div>
                                                    <p className="font-bold text-sm">{String(p.nome)}</p>
                                                    <p className="text-xs text-orange-600 font-bold">R$ {Number(p.preco || 0).toFixed(2)}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditingProduct(p); setProductForm({nome:String(p.nome), preco:String(p.preco), categoria:String(p.categoria)}); setShowProductModal(true); }} className="p-3 text-gray-300 bg-gray-50 rounded-xl active:scale-90 transition-all"><Icon name="edit-2" size={16}/></button>
                                                    <button onClick={() => { if(window.confirm("Excluir item?")) db.doc(`artifacts/${appId}/public/data/menu/${p.id}`).delete(); }} className="p-3 text-red-100 bg-red-50 rounded-xl active:scale-90 transition-all"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* NAVEGAÇÃO INFERIOR */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 pb-10 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-40 print-hidden">
                        <button onClick={() => {setActiveTab('mesas'); setSelectedMesa(null);}} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'mesas' ? 'text-[#8B5A2B]' : 'text-gray-300'}`}>
                            <Icon name="layout-grid" size={24} /><span className="text-[9px] font-black uppercase tracking-tighter uppercase">Salão</span>
                        </button>
                        <button onClick={() => {setActiveTab('menu'); setSelectedMesa(null);}} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'menu' ? 'text-[#8B5A2B]' : 'text-gray-300'}`}>
                            <Icon name="utensils-crossed" size={24} /><span className="text-[9px] font-black uppercase tracking-tighter uppercase">Menu</span>
                        </button>
                        <button onClick={() => {setActiveTab('cozinha'); setSelectedMesa(null);}} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'cozinha' ? 'text-[#8B5A2B]' : 'text-gray-300'}`}>
                            <Icon name="chef-hat" size={24} /><span className="text-[9px] font-black uppercase tracking-tighter uppercase">Cozinha</span>
                        </button>
                        <button onClick={() => {setActiveTab('caixa'); setSelectedMesa(null);}} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'caixa' ? 'text-[#8B5A2B]' : 'text-gray-300'}`}>
                            <Icon name="wallet" size={24} /><span className="text-[9px] font-black uppercase tracking-tighter uppercase">Caixa</span>
                        </button>
                    </nav>

                    {/* MODAIS (Consolidados) */}
                    {showNameModal && (
                        <div className="fixed inset-0 bg-[#4A3728]/80 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-in zoom-in duration-300">
                            <div className="bg-white w-full max-w-sm rounded-[48px] p-10 border-2 border-[#8B5A2B] shadow-2xl">
                                <h3 className="text-xl font-black text-center mb-6 text-[#8B5A2B] uppercase">Identificar Mesa</h3>
                                <input type="text" autoFocus placeholder="Nome do Cliente" className="w-full bg-[#FCF8F3] rounded-2xl p-5 font-bold outline-none focus:ring-2 focus:ring-[#8B5A2B] mb-6" value={tempClientName} onChange={e => setTempClientName(e.target.value)} />
                                <div className="flex gap-4">
                                    <button onClick={() => { setShowNameModal(false); setPendingProduct(null); }} className="flex-1 font-black text-[10px] text-gray-300 uppercase">Voltar</button>
                                    <button onClick={confirmOpening} className="flex-1 bg-[#8B5A2B] text-white py-5 rounded-3xl font-black text-xs uppercase shadow-xl active:scale-95 transition-all uppercase">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showPaymentModal && (
                        <div className="fixed inset-0 bg-[#4A3728]/80 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-in zoom-in duration-300">
                            <div className="bg-white w-full max-w-sm rounded-[48px] p-10 border-2 border-[#8B5A2B] shadow-2xl">
                                <h3 className="text-xl font-black text-center mb-8 text-[#8B5A2B] uppercase tracking-widest">Fechar Conta</h3>
                                <div className="space-y-3">
                                    {['Dinheiro', 'PIX', 'Cartão'].map(m => (
                                        <button key={m} onClick={() => finalizeSale(m)} className="w-full py-5 border-2 border-gray-100 rounded-3xl font-black text-[#8B5A2B] flex justify-between items-center px-8 uppercase text-xs hover:bg-orange-50 active:scale-95 transition-all">{m} <Icon name="arrow-right" size={16}/></button>
                                    ))}
                                </div>
                                <button onClick={() => setShowPaymentModal(false)} className="w-full mt-6 text-[10px] font-black text-gray-300 uppercase tracking-widest">Voltar</button>
                            </div>
                        </div>
                    )}

                    {receiptData && (
                        <div className="fixed inset-0 bg-white z-[110] flex flex-col p-8 animate-in slide-in-from-bottom duration-500">
                           <div className="flex-1 flex flex-col items-center justify-center text-center print-area">
                              <div className="bg-green-100 text-green-700 p-6 rounded-full mb-6 print-hidden"><Icon name="check-circle-2" size={48} /></div>
                              <h3 className="text-2xl font-black text-[#4A3728] mb-2 uppercase tracking-tighter print-hidden">Venda Concluída!</h3>
                              <div className="w-full bg-[#FCF8F3] p-6 rounded-3xl border-2 border-dashed border-[#EADCCB] text-left font-mono text-xs mt-4 modal-content">
                                <p className="font-bold text-center mb-4 uppercase tracking-widest">*** QUITUTES BALDIN ***</p>
                                <p>MESA: {String(receiptData.mesaNumero)} | CLIENTE: {String(receiptData.cliente)}</p>
                                <div className="border-t border-gray-200 my-4"></div>
                                {receiptData.itens?.map((i, idx) => (
                                    <div key={idx} className="flex justify-between mb-1">
                                        <span>{i.qty || i.quantidade}x {String(i.nome || i.name)}</span>
                                        <span>R$ {(Number(i.preco) * Number(i.qty || i.quantidade)).toFixed(2)}</span>
                                    </div>
                                ))}
                                <div className="border-t border-gray-200 pt-2 mt-4 flex justify-between font-bold text-sm"><span>TOTAL</span><span>R$ {Number(receiptData.total).toFixed(2)}</span></div>
                                <p className="mt-8 text-center text-[8px] opacity-40 uppercase tracking-widest text-center w-full">Volte Sempre!</p>
                              </div>
                           </div>
                           <div className="space-y-4 print-hidden">
                              <button onClick={handlePrint} className="w-full bg-[#8B5A2B] text-white py-5 rounded-3xl font-black flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all"><Icon name="printer" size={20} /> IMPRIMIR TICKET</button>
                              <button onClick={() => copyToClipboard('receipt')} className="w-full border-2 border-[#8B5A2B] text-[#8B5A2B] py-5 rounded-3xl font-black flex items-center justify-center gap-2"><Icon name="copy" size={20} /> COPIAR RESUMO</button>
                              <button onClick={() => setReceiptData(null)} className="w-full text-gray-400 font-bold text-xs uppercase tracking-widest">FECHAR</button>
                           </div>
                        </div>
                    )}

                    {showClosureModal && (
                        <div className="fixed inset-0 bg-[#4A3728]/80 backdrop-blur-md z-[120] flex items-center justify-center p-6 print-area">
                            <div className="bg-white w-full max-w-lg rounded-[48px] p-10 modal-content overflow-y-auto max-h-[90vh] shadow-2xl">
                                <div className="text-center space-y-6">
                                    <div className="flex justify-between items-center print-hidden">
                                        <div className="w-8"></div>
                                        <h3 className="text-lg font-black text-[#8B5A2B] uppercase tracking-widest">Relatório Final</h3>
                                        <button onClick={() => setShowClosureModal(false)} className="p-2 bg-gray-100 rounded-full active:scale-90"><Icon name="x" size={20}/></button>
                                    </div>
                                    <p className="font-black text-xl uppercase text-[#8B5A2B] tracking-widest">*** QUITUTES BALDIN ***</p>
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest -mt-4">Relatório do dia: {new Date().toLocaleDateString()}</p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-[#FCF8F3] p-5 rounded-3xl text-left border border-gray-100 shadow-inner">
                                            <p className="text-[8px] font-black text-gray-400 uppercase">Total Bruto</p>
                                            <p className="text-2xl font-black text-[#8B5A2B]">R$ {closureSummary.total.toFixed(2)}</p>
                                        </div>
                                        <div className="bg-[#FCF8F3] p-5 rounded-3xl text-left border border-gray-100 shadow-inner">
                                            <p className="text-[8px] font-black text-gray-400 uppercase">Vendas</p>
                                            <p className="text-2xl font-black text-[#4A3728]">{closureSummary.count}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white border rounded-[32px] p-6 space-y-3 text-left shadow-sm">
                                        <p className="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-1">Pagamentos</p>
                                        <div className="flex justify-between font-bold text-sm"><span>📱 PIX</span><span>R$ {closureSummary.PIX.toFixed(2)}</span></div>
                                        <div className="flex justify-between font-bold text-sm border-t pt-3"><span>💳 Cartão</span><span>R$ {closureSummary.Cartão.toFixed(2)}</span></div>
                                        <div className="flex justify-between font-bold text-sm border-t pt-3"><span>💵 Dinheiro</span><span>R$ {closureSummary.Dinheiro.toFixed(2)}</span></div>
                                    </div>
                                    <div className="space-y-3 print-hidden">
                                        <button onClick={handlePrint} className="w-full bg-[#8B5A2B] text-white py-5 rounded-3xl font-black uppercase text-xs flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all"><Icon name="printer" size={16} /> Imprimir / PDF</button>
                                        <button onClick={() => copyToClipboard('closure')} className="w-full border-2 border-[#8B5A2B] text-[#8B5A2B] py-5 rounded-3xl font-black flex items-center justify-center gap-2 uppercase text-xs"><Icon name="copy" size={16} /> Copiar Relatório</button>
                                        <button onClick={() => setShowConfirmClose(true)} className="w-full bg-red-600 text-white py-5 rounded-3xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Encerrar e Fechar Caixa</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showConfirmClose && (
                        <div className="fixed inset-0 bg-red-950/95 backdrop-blur-xl z-[130] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[48px] p-10 text-center shadow-2xl border-4 border-red-500">
                                <Icon name="alert-triangle" size={48} className="text-red-600 mx-auto mb-6" />
                                <h3 className="text-xl font-black text-red-600 uppercase mb-4 tracking-widest text-lg">Atenção Máxima!</h3>
                                <p className="text-sm text-gray-500 mb-8 leading-relaxed">Deseja realmente <b>ENCERRAR</b> o caixa? O histórico será limpo permanentemente.</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleFecharCaixaFinal} className="w-full bg-red-600 text-white py-5 rounded-3xl font-black text-xs uppercase shadow-xl active:scale-95 transition-all">Sim, Limpar e Fechar</button>
                                    <button onClick={() => setShowConfirmClose(false)} className="w-full text-gray-400 font-bold text-[10px] uppercase tracking-widest py-2">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showProductModal && (
                        <div className="fixed inset-0 bg-[#4A3728]/80 backdrop-blur-md z-[100] flex items-center justify-center p-6 print-hidden">
                            <div className="bg-white w-full max-w-sm rounded-[48px] p-10 border-2 border-[#8B5A2B] shadow-2xl">
                                <h3 className="text-xl font-black mb-8 text-[#8B5A2B] uppercase tracking-widest text-center">{editingProduct ? 'Editar' : 'Novo'} Quitute</h3>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Nome" className="w-full bg-[#FCF8F3] rounded-2xl p-5 font-bold border-none outline-none focus:ring-2 focus:ring-[#8B5A2B]" value={productForm.nome} onChange={e=>setProductForm({...productForm, nome:e.target.value})} />
                                    <input type="number" placeholder="Preço" className="w-full bg-[#FCF8F3] rounded-2xl p-5 font-bold border-none outline-none focus:ring-2 focus:ring-[#8B5A2B]" value={productForm.preco} onChange={e=>setProductForm({...productForm, preco:e.target.value})} />
                                    <select className="w-full bg-[#FCF8F3] rounded-2xl p-5 font-bold border-none outline-none focus:ring-2 focus:ring-[#8B5A2B] appearance-none" value={productForm.categoria} onChange={e=>setProductForm({...productForm, categoria:e.target.value})}>
                                        {CATEGORIAS.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="flex gap-4 mt-8">
                                    <button onClick={()=>setShowProductModal(false)} className="flex-1 font-bold text-gray-300 uppercase text-[10px]">Sair</button>
                                    <button onClick={saveProduct} className="flex-1 bg-[#8B5A2B] text-white py-5 rounded-3xl font-black text-xs uppercase shadow-xl active:scale-95 transition-all">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
